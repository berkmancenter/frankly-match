name: Deploy demo to GitHub Pages

on:
    push:
        branches: [main]
        paths:
            - demo/index.html
    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: pages
    cancel-in-progress: true

jobs:
    deploy:
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - uses: actions/checkout@v4

            - name: Inject API key
              run: |
                  sed -i "s/FRANKLY_MATCH_API_KEY/${{ secrets.FRANKLY_MATCH_API_KEY }}/g" demo/index.html

            - uses: actions/configure-pages@v5

            - uses: actions/upload-pages-artifact@v3
              with:
                  path: demo/

            - uses: actions/deploy-pages@v4
              id: deployment
