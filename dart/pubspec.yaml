name: frankly_match
description: >-
  Diversity-maximizing group matching for deliberative conversations.
  Assigns participants into groups that maximise Hamming distance across
  answer masks, ensuring each group contains heterogeneous viewpoints.
version: 0.2.0
repository: https://github.com/berkmancenter/frankly/tree/main/matching/dart
issue_tracker: https://github.com/berkmancenter/frankly/issues
topics:
  - matching
  - deliberation
  - hamming-distance
  - diversity

environment:
  sdk: ">=3.0.0 <4.0.0"

dev_dependencies:
  test: ^1.24.0
